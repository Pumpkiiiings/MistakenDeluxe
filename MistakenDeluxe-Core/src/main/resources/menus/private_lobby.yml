title: "<dark_gray>Configuración de Partida Privada"
items:
  start:
    name: "<green><bold>Iniciar Partida"
    lore:
      - "<gray>Inicia la partida forzosamente."
  rules:
    name: "<gold><bold>Reglas de Juego"
    lore:
      - "<gray>Modifica las reglas de la partida."
  map:
    name: "<gold><bold>Selector de Mapa"
    lore:
      - "<gray>Elige el mapa a jugar."
  mode:
    name: "<gold><bold>Selector de Modo"
    lore:
      - "<gray>Elige el modo de juego."
  players:
    name: "<gold><bold>Selector de Jugadores"
    lore:
      - "<gray>Elige roles de jugadores."
  back:
    name: "<red>Volver"

menus:
  map_selector:
    title: "<dark_gray>Seleccionar Mapa"
    items:
      map:
        lore_id: "<gray>ID: {map}"
        lore_click: "<e>Click para seleccionar"
  mode_selector:
    title: "<dark_gray>Seleccionar Modo"
    items:
      mode:
        lore_click: "<e>Click para seleccionar"
  player_selector:
    title: "<dark_gray>Selector de Jugadores"
    items:
      player:
        lore_role: "<gray>Rol: {role}"
        lore_left: "<e>Click Izq: Toggle Asesino"
        lore_right: "<e>Click Der: Toggle Superviviente"
        roles:
          random: "<gray>Aleatorio"
          killer: "<red><bold>Asesino"
          survivor: "<green><bold>Superviviente"
  rule_editor:
    title: "<dark_gray>Editor de Reglas"
    items:
      glowing:
        name: "<gold><bold>Glowing Constante"
        lore_state: "<gray>Estado: {color}{state}"
      heartbeats:
        name: "<gold><bold>Latidos (Heartbeats)"
        lore_state: "<gray>Estado: {color}{state}"
      speed:
        name: "<gold><bold>Velocidad Base"
        lore_level: "<gray>Nivel: <yellow>{level}"
      jump:
        name: "<gold><bold>Salto Base"
        lore_level: "<gray>Nivel: <yellow>{level}"
      blindness:
        name: "<gold><bold>Ceguera Permanente"
        lore_role: "<gray>Aplica a: <yellow>{role}"
      khealth:
        name: "<gold><bold>Vida Asesino"
        lore_hearts: "<gray>Corazones: <red>{hearts}"
      shealth:
        name: "<gold><bold>Vida Superviviente"
        lore_hearts: "<gray>Corazones: <red>{hearts}"
