    lobby: "YELLOW"
    break: "YELLOW"
    voting: "WHITE"
    starting: "PURPLE"
    ingame: "RED"
    ending: "PINK"

# --- LMS ---

lms:
  title: "<#FF4C4C><bold>LAST MAN STANDING"
  subtitle:
    survivor: "<#AAAAAA>You are alone! <#FF4C4C>SURVIVE."
    killer: "<#AA0000>Only one left... HUNT THEM DOWN!"
    other: "<#FFA500><player> <#AAAAAA>is the last hope."
  chat:
    survivor: "<newline><#FF4C4C><b>[!]</b> <white>Your teammates have fallen. You are the <b>LAST MAN STANDING</b>.<newline>"
