# --- GENERATORS ---
generators:
  names:
    RAW_IRON_BLOCK: "<#FFA500>SCRAP GENERATOR"
    IRON_BLOCK: "<white>ELECTRICAL SYSTEM"
    AMETHYST_BLOCK: "<purple>MEMORY CORE"
  hologram:
    lines-idle:
      - "<#FFA500><bold>{name}"
      - "<white>Progress: <#AAAAAA>{progress}%"
      - "<#FFD700>Click to repair!"
    lines-completed:
      - "<#76F869><bold>✔ POWER RESTORED ✔"
      - "<#AAAAAA>Good job!"

# --- ROLES ---
roles:
  survivor:
    title: "<#76F869><bold>SURVIVOR"
    subtitle: "<white>Repair the generators and escape."
    chat:
      - "<#76F869>Look for <#FFA500>Raw Iron</#FFA500> blocks."
      - "<#FF4C4C>Don't fail the skill checks!"
  killer:
    title: "<#FF4C4C><bold>KILLER"
    subtitle: "<white>Eliminate everyone before time runs out."
    transform: "<prefix><#AAAAAA>Your humanity fades... You awakened as: </#AAAAAA>{name}"
    chat:
      - "<#76F869>Kill all players one by one."
      - "<#FF4C4C>No mercy..."

# --- KILLER MESSAGES ---
killer:
  transform: "<white>You have awakened as: </white>{name}"
