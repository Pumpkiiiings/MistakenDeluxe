# ======================================================
#          MISTAKEN - ENGLISH LANGUAGE (EN)
# ======================================================

prefix: "<b><color:#88C6F2>MISTAKEN</color></b> <color:#ADADAD>|</color> "

lobby:
  welcome: ""

# --- VOTING ---
voting:
  started: "<green>Voting has started! Use <yellow>/vote <map></yellow>"
  not-active: "<prefix><red>There is no active vote right now, bro."
  already-voted: "<prefix><red>You already cast your vote this game."
  usage: "<prefix><red>Usage: /vote <map>"
  not-found: "<prefix><red>The map <white>{map}</white> doesn't exist, you gotta be kidding."
  success: "<prefix><green>You voted for: <aqua>{map}</aqua>"
  map-option: "<dark_gray>» <aqua>{map}</aqua>"
  not-enough-players: "<prefix><red>Not enough souls! There aren't enough players to start."

# --- BOSSBAR ---
bossbar:
  lobby: "<gradient:#ffcc00:#ffaa00><bold>WAITING FOR PLAYERS...</bold></gradient> <gray>({online})"
  break: "<yellow>Break <gray>| <white><time>s"
  voting: "<b><color:#8AFF73>VOTING IN PROGRESS</color></b> <gray>| <white>Ends in: <yellow>{time}s"
  starting: "<red><bold>GET READY!</bold> <white>Starting in <yellow>{time}s"
  ingame: "<white>Map: <yellow>{map}</yellow> <dark_gray>|</dark_gray> Mode: <aqua>{mode}</aqua> <dark_gray>|</dark_gray> Time: <green>{time}</green>"
  ending: "<b><color:#FF001D>MATCH ENDED!</color></b>"
  colors:
    lobby: "YELLOW"
    break: "YELLOW"
    voting: "WHITE"
    starting: "PURPLE"
    ingame: "RED"
    ending: "PINK"

# --- LMS ---

lms:
  title: "<red><bold>LAST MAN STANDING"
  subtitle:
    survivor: "<gray>You are alone! <red>SURVIVE."
    killer: "<dark_red>Only one left... HUNT THEM DOWN!"
    other: "<gold><player> <gray>is the last hope."
  chat:
    survivor: "<newline><red><b>[!]</b> <white>Your teammates have fallen. You are the <b>LAST MAN STANDING</b>.<newline>"
    other: "<newline><red><b>[!]</b> <white><player> is the <b>LAST MAN STANDING</b>.<newline>"

# --- ABILITIES ---
habilidades:
  pedido-impacto-asesino: "&aWell done! &fThe hit has reached the killer"

# --- COMBAT ---
combat:
  heart-icon-on: "❤"
  heart-icon-off: "🖤"
  hunters-mark: "<red>"
  health-bar: "<red>{hearts_on}<gray>{hearts_off}"
  cooldown: "<red>Wait <white>{time}s</white> before attacking again!"
  critical-wound: "<red><bold>YOUR LEGS ARE FAILING!</bold> <gray>Find help or crawl."
  kill-reward-actionbar: "<red><bold>+40 HEALTH</bold></red> <gray>|</gray> <gold><bold>+${reward} CREDITS</bold></gold>"
  kill-reward-chat: "<prefix><gray>You received <green>${reward}</green> for claiming a victim."
  rescue-start-carrier: "<prefix><green>You picked up <white>{target}</white>! Take them to a safe place."
  rescue-start-victim: "<prefix><green><white>{carrier}</white> is carrying you."
  rescue-dropped-carrier: "<prefix><yellow>You dropped your teammate on the ground."
  rescue-dropped-victim: "<prefix><yellow>You have been dropped."
  rescue-interrupted: "<prefix><red>You dropped your teammate from the impact!"
  win-reward-killer: "<prefix><gold>Massacre complete! <white>You received <green>${amount}</green> for your victory."
  win-reward-survivor: "<green>You survived the killer! <white>You received <green>${amount}</green> for escaping."

# --- SCOREBOARD ---
scoreboard:
  title: "<gradient:#88C6F2:#4386B5><bold>MISTAKEN</bold></gradient>"
  lobby:
    - ""
    - "<white>Status: <yellow>Lobby"
    - "<white>Players: <green>%online%"
    - ""
    - "<white>Profile: <aqua>%player%"
    - ""
  voting:
    - ""
    - "<white>Phase: <aqua>VOTING"
    - "<white>Time: <yellow>%timer%s"
    - ""
    - "<gray>Use /vote"
    - ""
  break:
    - ""
    - "<white>Status: <yellow>Break"
    - "<white>Players: <green>%online%"
    - ""
    - "<white>Profile: <aqua>%player%"
    - ""
  starting:
    - ""
    - "<white>Map: <green>%map%"
    - "<white>Starts in: <yellow>%timer%s"
    - ""
    - "<red><bold>READY!</bold>"
    - ""
  ingame_classic:
    - ""
    - "<white>Map: <green>%map%"
    - "<white>Time: <yellow>%timer%"
    - ""
    - "<white>Gens: <green>%completed%/%total%"
    - "<white>Killer:"
    - "%killers%"
    - ""
    - "<white>Lives: <red>%lives% ❤"
    - ""
  ingame_double_killer:
    - ""
    - "<white>Map: <green>%map%"
    - "<white>Time: <yellow>%timer%"
    - ""
    - "<white>Gens: <green>%completed%/%total%"
    - "<white>Killers:"
    - "%killers%"
    - ""
    - "<white>Lives: <red>%lives% ❤"
    - ""
  ingame_one_bounce:
    - ""
    - "<white>Map: <green>%map%"
    - "<white>Time: <yellow>%timer%"
    - ""
    - "<white>Gens: <green>%completed%/%total%"
    - "%killers%"
    - ""
    - "<white>Lives: <red>%lives% ❤"
    - ""
  ingame_freeze_tag:
    - ""
    - "<white>Map: <green>%map%"
    - "<white>Time: <yellow>%timer%"
    - ""
    - "<white>Gens: <green>%completed%/%total%"
    - "<white>Killer:"
    - "%killers%"
    - ""
  ending:
    - ""
    - "<white>Status: <red>ENDED"
    - "<white>Winner(s): %killers%"
    - ""

# --- GENERATORS ---
generators:
  names:
    RAW_IRON_BLOCK: "<gold>SCRAP GENERATOR"
    IRON_BLOCK: "<white>ELECTRICAL SYSTEM"
    AMETHYST_BLOCK: "<purple>MEMORY CORE"
  hologram:
    lines-idle:
      - "<gold><bold>{name}"
      - "<white>Progress: <gray>{progress}%"
      - "<yellow>Click to repair!"
    lines-completed:
      - "<green><bold>✔ POWER RESTORED ✔"
      - "<gray>Good job!"

# --- ROLES ---
roles:
  survivor:
    title: "<green><bold>SURVIVOR"
    subtitle: "<white>Repair the generators and escape."
    chat:
      - "<green>Look for <gold>Raw Iron</gold> blocks."
      - "<red>Don't fail the skill checks!"
  killer:
    title: "<red><bold>KILLER"
    subtitle: "<white>Eliminate everyone before time runs out."
    transform: "<prefix><gray>Your humanity fades... You awakened as: </gray>{name}"
    chat:
      - "<green>Kill all players one by one."
      - "<red>No mercy..."

# --- KILLER MESSAGES ---
killer:
  transform: "<white>You have awakened as: </white>{name}"
  killer-no-regen: "<prefix><red>⚠ No natural regeneration. Kill to heal!"

# --- SHOP ---
tienda:
  clase-especial: "<dark_gray>Special Class Entity"
  clase-humana: "<gray>Class: <white>Human Survivor"
  habilidades-titulo: "<gray>▶ <white>Abilities:"
  estado-seleccionado: "<green>✔ <bold>SELECTED"
  estado-poseido: "<yellow>» Click to select"
  estado-precio: "<white>Cost: <yellow>● {amount} coins"
  estado-comprar: "<green>Click to purchase killer"
  estado-comprar-superviviente: "<#00d4ff>Click to purchase survivor"
  seleccionado: "<prefix><green>Selected: <white>{name}"
  comprado: "<prefix><gold>Awesome! You unlocked: <white>{name}"
  ya-seleccionado: "<yellow><bold>[!] <reset><yellow>This class is already selected."

