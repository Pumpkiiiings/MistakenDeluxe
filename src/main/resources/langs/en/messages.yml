  langs: "<gray>» <yellow>/mistaken langs <id> <dark_gray>- <white>Change your language."
  afk: "<gray>» <yellow>/mistaken afk <dark_gray>- <white>Toggle AFK mode."
  edit: "<gray>» <yellow>/mistaken edit <dark_gray>- <white>Staff build mode."
  start: "<gray>» <yellow>/mistaken start <dark_gray>- <white>Force start."
  stop: "<gray>» <yellow>/mistaken stop <dark_gray>- <white>Stop game."
  reload: "<gray>» <yellow>/mistaken reload <dark_gray>- <white>Reload config."
  setstamina: "<gray>» <yellow>/mistaken setstamina <val> <dark_gray>- <white>Adjust stamina."
  setasesino: "<gray>» <yellow>/mistaken setasesino <id> <dark_gray>- <white>Killer test."
  setsuperviviente: "<gray>» <yellow>/mistaken setsuperviviente <id> <dark_gray>- <white>Survivor test."
  removekiller: "<gray>» <yellow>/mistaken removekiller <p> <dark_gray>- <white>Remove test role."
  setmode: "<gray>» <yellow>/mistaken setmode <id> <dark_gray>- <white>Force a mode."
  footer: " "

admin:
  reload-success: "<prefix><green>Configuration and languages reloaded."
  start-forcing: "<prefix><green>Initiating hunt sequence..."
  start-already-ingame: "<prefix><red>Error: A game is already in progress."
  stop-broadcast: "<red><bold>MATCH CANCELED</bold> <gray>by staff."
  stop-success: "<green>Game forcefully ended."
  lobby-set: "<prefix><green>Lobby point saved successfully."
  lang-set: "<prefix><green>Language changed to: <aqua>{langs}"
  usage-lang: "<prefix><red>Usage: /mistaken langs <es/en/fr/jp/zh>"
  stamina-set: "<prefix><green>Stamina of <white>{player}</white> set to <yellow>{amount}%"
  removekiller-success: "<prefix><green>Role removed from <white>{player}</white>."
  removekiller-target: "<prefix><red>Your role has been removed."
  mode-forced: "<prefix><yellow>An admin forced the mode: <aqua>{mode}"
  afk-enabled: "<prefix><yellow>AFK mode enabled. The game engine will now ignore you."
  afk-disabled: "<prefix><green>AFK mode disabled. Welcome back to the hunt!"
  edit-enabled: "<prefix><aqua>Edit mode enabled. You are invisible to game logic."
  edit-disabled: "<prefix><red>Edit mode disabled. Game logic affects you again."

stats:
