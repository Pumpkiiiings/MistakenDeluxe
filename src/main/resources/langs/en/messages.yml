  wins-survivor: "<gray>Survivor Wins: <green><value>"
  wins-assassin: "<gray>Killer Wins: <red><value>"
  kills: "<gray>Total Kills: <dark_red><value>"
  deaths: "<gray>Total Deaths: <dark_gray><value>"
  footer: "<dark_gray><st>"

# --- MODES ---
modes:
  classic:
    title: "<red><bold>CLASSIC MODE"
    subtitle: "<white>A killer lurks in the shadows..."
  double_killer:
    title: "<red><bold>DOUBLE KILLER"
