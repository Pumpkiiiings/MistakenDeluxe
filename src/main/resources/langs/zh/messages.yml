# ======================================================
#          MISTAKEN - 简体中文 (ZH)
# ======================================================

prefix: "<b><color:#88C6F2>MISTAKEN</color></b> <color:#ADADAD>|</color> "

# --- 投票系统 ---
voting:
  started: "<green>投票已开始！使用 <yellow>/vote <地图名></yellow>"
  not-active: "<prefix><red>当前没有正在进行的投票。"
  already-voted: "<prefix><red>你已经在此局游戏中投票了。"
  usage: "<prefix><red>用法：/vote <地图名>"
  not-found: "<prefix><red>地图 <white>{map}</white> 不存在。"
  success: "<prefix><green>你已成功投票给：<aqua>{map}</aqua>"
  map-option: "<dark_gray>» <aqua>{map}</aqua>"
  not-enough-players: "<prefix><red>灵魂不足！玩家人数不足，无法开始。"

# --- BOSSBAR ---
bossbar:
  lobby: "<gradient:#ffcc00:#ffaa00><bold>等待玩家中...</bold></gradient> <gray>({online})"
  voting: "<b><color:#8AFF73>投票进行中</color></b> <gray>| <white>剩余时间: <yellow>{time}s"
  starting: "<red><bold>准备好！</bold> <white>游戏将在 <yellow>{time}s <white>后开始"
  ingame: "<white>地图: <yellow>{map}</yellow> <dark_gray>|</dark_gray> 模式: <aqua>{mode}</aqua> <dark_gray>|</dark_gray> 时间: <green>{time}</green>"
  ending: "<b><color:#FF001D>游戏已结束！</color></b>"
  colors:
    lobby: "YELLOW"
    voting: "WHITE"
    starting: "PURPLE"
    ingame: "RED"
    ending: "PINK"

# --- 战斗与救援 ---
combat:
  heart-icon-on: "❤"
  heart-icon-off: "🖤"
  hunters-mark: "<red>"
  health-bar: "<red>{hearts_on}<gray>{hearts_off}"
  cooldown: "<red>请等待 <white>{time}秒</white> 后再攻击！"
  critical-wound: "<prefix><red><bold>你的双腿失去了知觉！</bold> <gray>寻求帮助或爬行求生。"
  kill-reward-actionbar: "<red><bold>+40 生命值</bold></red> <gray>|</gray> <gold><bold>+${reward} 积分</bold></gold>"
  kill-reward-chat: "<prefix><gray>你因消灭目标获得了 <green>${reward}</green> 积分。"
  rescue-start-carrier: "<prefix><green>你背起了 <white>{target}</white>！带他们去安全的地方。"
  rescue-start-victim: "<prefix><green><white>{carrier}</white> 正在背着你。"
  rescue-dropped-carrier: "<prefix><yellow>你将队友放到了地上。"
  rescue-dropped-victim: "<prefix><yellow>你被放到了地上。"
  rescue-interrupted: "<prefix><red>受到冲击，你掉落了队友！"
  win-reward-killer: "<prefix><gold>屠杀完成！<white>由于获胜，你获得了 <green>${amount}</green> 奖励。"
  win-reward-survivor: "<green>你逃脱了杀手的猎杀！<white>由于幸存，你获得了 <green>${amount}</green> 奖励。"

# --- 计分板 (ZH) ---
scoreboard:
  title: "<gradient:#88C6F2:#4386B5><bold>MISTAKEN</bold></gradient>"
  lobby:
    - ""
    - "<white>状态: <yellow>游戏大厅"
    - "<white>玩家人数: <green>%online%"
    - ""
    - "<white>个人资料: <aqua>%player%"
    - ""
  voting:
    - ""
    - "<white>阶段: <aqua>地图投票"
    - "<white>剩余时间: <yellow>%timer%秒"
    - ""
    - "<gray>使用 /vote 投票"
    - ""
  starting:
    - ""
    - "<white>地图: <green>%map%"
    - "<white>开始倒计时: <yellow>%timer%秒"
    - ""
    - "<red><bold>准备好迎接恐惧！</bold>"
    - ""
  ingame_classic:
    - ""
    - "<white>地图: <green>%map%"
    - "<white>剩余时间: <yellow>%timer%"
    - ""
    - "<white>发电机: <green>%completed%/%total%"
    - "<white>杀手:"
    - "%killers%"
    - ""
    - "<white>生命值: <red>%lives% ❤"
    - ""
  ingame_double_killer:
    - ""
    - "<white>地图: <green>%map%"
    - "<white>剩余时间: <yellow>%timer%"
    - ""
    - "<white>发电机: <green>%completed%/%total%"
    - "<white>双重杀手:"
    - "%killers%"
    - ""
    - "<white>生命值: <red>%lives% ❤"
    - ""
  ingame_one_bounce:
    - ""
    - "<white>地图: <green>%map%"
    - "<white>剩余时间: <yellow>%timer%"
    - ""
    - "<white>发电机: <green>%completed%/%total%"
    - "%killers%"
    - ""
    - "<white>生命值: <red>%lives% ❤"
    - ""
  ingame_freeze_tag:
    - ""
    - "<white>地图: <green>%map%"
    - "<white>剩余时间: <yellow>%timer%"
    - ""
    - "<white>发电机: <green>%completed%/%total%"
    - "<white>当前杀手:"
    - "%killers%"
    - ""
  ending:
    - ""
    - "<white>状态: <red>游戏结束"
    - "<white>获胜者: %killers%"
    - ""

# --- 发电机 ---
generators:
  names:
    RAW_IRON_BLOCK: "<gold>废旧发电机"
    IRON_BLOCK: "<white>线路系统"
    AMETHYST_BLOCK: "<purple>记忆核心"
  hologram:
    lines-idle:
      - "<gold><bold>{name}"
      - "<white>进度: <gray>{progress}%"
      - "<yellow>点击修理！"
    lines-completed:
      - "<green><bold>✔ 电力已恢复 ✔"
      - "<gray>干得漂亮！"

# --- 角色 ---
roles:
  survivor:
    title: "<green><bold>生存者"
    subtitle: "<white>修理发电机并逃生。"
    chat:
      - "<green>寻找 <gold>生铁块</gold> 进行修理。"
      - "<red>不要在精准挑战中失败！"
  killer:
    title: "<red><bold>杀手"
    subtitle: "<white>在他们逃脱前处决所有人。"
    transform: "<prefix><gray>你的人性正在消逝... 你已觉醒为：</gray>{name}"
    chat:
      - "<green>逐一处决所有玩家。"
      - "<red>绝不留情..."

# --- 杀手消息 ---
killer:
  transform: "<white>你已觉醒为：</white>{name}"
  killer-no-regen: "<prefix><red>⚠ 无法自然回血。通过杀戮来回血！"

# --- 商店 ---
tienda:
  titulo: "<dark_gray>杀手 | Mistaken"
  titulo-supervivientes: "<#00d4ff>生还者 | 黑市"
  clase-especial: "<dark_gray>特殊等级实体"
  clase-humana: "<gray>职业: <white>人类生还者"
  habilidades-titulo: "<gray>▶ <white>技能:"
  estado-seleccionado: "<green>✔ <bold>已选择"
