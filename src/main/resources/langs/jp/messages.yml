  player-not-found: "<prefix><red>プレイヤーが見つかりません。"
  player-not-killer: "<prefix><red>殺人鬼ではありません。"
  unknown-command: "<prefix><red>不明なコマンドです。"
  invalid-number: "<prefix><red>有効な数値を入力してください。"
  invalid-spawn-type: "<prefix><red>'asesino' または 'survivor' を指定してください。"
  invalid-gen-block: "<prefix><red>粗鉄またはアメジストブロックを向いてください。"
  not-a-generator: "<prefix><red>それは発電機ではありません。"
  killer-not-found: "<prefix><red>そのクラスは存在しません。"

# --- パラノイア・エンジン (PARANOIA ENGINE) ---
