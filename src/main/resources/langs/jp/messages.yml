  lang-not-found: "<prefix><red>その言語は存在しません。"
  no-money: "<prefix><red>所持金が足りません。"
  arena-not-found: "<prefix><red>アリーナ <white>{name}</white> は見つかりません。"
  voting-not-active: "<prefix><red>現在、投票は行われていません。"
