  - "<dark_gray><obfuscated>||</obfuscated> 今、何か聞こえなかったか？ <obfuscated>||</obfuscated>"
  - "<dark_gray>誰かに見られている...</dark_gray>"
  - "<red>奴が近くにいる。</red>"
  - "<dark_gray>振り返るな。</dark_gray>"

# --- スタミナ (STAMINA) ---
