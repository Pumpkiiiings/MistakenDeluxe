  check-header: "<dark_gray>» <gray><yellow>{name}</yellow> の状態: {status}"
  check-survivors: "<gray> - 生存者スポーン数: <white>{count}"
  check-generators: "<gray> - 発電機数: <white>{count}"
  check-killer: "<gray> - 殺人鬼スポーン: {icon}"
  help-header: "<gradient:#88C6F2:#4386B5><bold>MISTAKEN</bold></gradient> <dark_gray>| <gray>アリーナ設定"
