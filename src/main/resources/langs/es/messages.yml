# ======================================================
#          MISTAKEN - SPANISH LANGUAGE (MEXICO)
# ======================================================

prefix: "<b><color:#88C6F2>MISTAKEN</color></b> <color:#ADADAD>|</color> "

# --- VOTACIÓN ---
voting:
  started: "<green>¡Empezó la votación! Usa <yellow>/vote <map></yellow>"
  not-active: "<prefix><red>No hay ninguna votación activa ahorita, bro."
  already-voted: "<prefix><red>Ya soltaste tu voto en esta partida."
  usage: "<prefix><red>Usa: /vote <map>"
  not-found: "<prefix><red>El mapa <white>{map}</white> no existe, te la bañaste."
  success: "<prefix><green>Votaste por: <aqua>{map}</aqua>"
  map-option: "<dark_gray>» <aqua>{map}</aqua>"
  not-enough-players: "<prefix><red>¡Faltan almas! No hay suficientes jugadores para empezar."

# --- BOSSBAR ---
bossbar:
  lobby: "<gradient:#ffcc00:#ffaa00><bold>ESPERANDO JUGADORES...</bold></gradient> <gray>({online})"
  voting: "<b><color:#8AFF73>VOTACIÓN EN CURSO</color></b> <gray>| <white>Termina en: <yellow>{time}s"
  starting: "<red><bold>¡PREPÁRATE!</bold> <white>Empezamos en <yellow>{time}s"
  ingame: "<white>Mapa: <yellow>{map}</yellow> <dark_gray>|</dark_gray> Modo: <aqua>{mode}</aqua> <dark_gray>|</dark_gray> Tiempo: <green>{time}</green>"
  ending: "<b><color:#FF001D>¡PARTIDA TERMINADA!</color></b>"
  colors:
    lobby: "YELLOW"
    voting: "WHITE"
    starting: "PURPLE"
    ingame: "RED"
    ending: "PINK"

# --- COMBATE ---
combat:
  heart-icon-on: "❤"
  heart-icon-off: "🖤"
  hunters-mark: "<red>"
  health-bar: "<red>{hearts_on}<gray>{hearts_off}"
  cooldown: "<red>Espérate <white>{time}s</white> para volver a atacar!"
  critical-wound: "<prefix><red><bold>¡TUS PIERNAS FALLAN!</bold> <gray>Busca ayuda o arrástrate."
  kill-reward-actionbar: "<red><bold>+40 VIDA</bold></red> <gray>|</gray> <gold><bold>+${reward} CRÉDITOS</bold></gold>"
  kill-reward-chat: "<prefix><gray>Recibiste <green>${reward}</green> por cobrarte una víctima."
  rescue-start-carrier: "<prefix><green>¡Cargaste a <white>{target}</white>! Llévalo a un lugar seguro."
  rescue-start-victim: "<prefix><green><white>{carrier}</white> te lleva cargando."
  rescue-dropped-carrier: "<prefix><yellow>Dejaste a tu compañero en el suelo."
  rescue-dropped-victim: "<prefix><yellow>Te han dejado caer."
  rescue-interrupted: "<prefix><red>¡Soltaste a tu compañero por el impacto!"
  win-reward-killer: "<prefix><gold>¡Masacre completa! <white>Recibiste <green>${amount}</green> por tu victoria."
  win-reward-survivor: "<green>¡Sobreviviste al asesino! <white>Recibiste <green>${amount}</green> por escapar."

# --- SCOREBOARD ---
scoreboard:
  title: "<gradient:#88C6F2:#4386B5><bold>MISTAKEN</bold></gradient>"
  lobby:
    - ""
    - "<white>Estado: <yellow>Lobby"
    - "<white>Jugadores: <green>%online%"
    - ""
    - "<white>Perfil: <aqua>%player%"
    - ""
  voting:
    - ""
    - "<white>Fase: <aqua>VOTACIÓN"
    - "<white>Tiempo: <yellow>%timer%s"
    - ""
    - "<gray>Usa /vote"
    - ""
  starting:
    - ""
    - "<white>Mapa: <green>%map%"
    - "<white>Empieza en: <yellow>%timer%s"
    - ""
    - "<red><bold>¡LISTO!</bold>"
    - ""
  ingame_classic:
    - ""
    - "<white>Mapa: <green>%map%"
    - "<white>Tiempo: <yellow>%timer%"
    - ""
    - "<white>Gens: <green>%completed%/%total%"
    - "<white>Asesino:"
    - "%killers%"
    - ""
    - "<white>Vidas: <red>%lives% ❤"
    - ""
  ingame_double_killer:
    - ""
    - "<white>Mapa: <green>%map%"
    - "<white>Tiempo: <yellow>%timer%"
    - ""
    - "<white>Gens: <green>%completed%/%total%"
    - "<white>Asesinos:"
    - "%killers%"
    - ""
    - "<white>Vidas: <red>%lives% ❤"
    - ""
  ingame_one_bounce:
    - ""
    - "<white>Mapa: <green>%map%"
    - "<white>Tiempo: <yellow>%timer%"
    - ""
    - "<white>Gens: <green>%completed%/%total%"
    - "%killers%"
    - ""
    - "<white>Vidas: <red>%lives% ❤"
    - ""
  ingame_freeze_tag:
    - ""
    - "<white>Mapa: <green>%map%"
    - "<white>Tiempo: <yellow>%timer%"
    - ""
    - "<white>Gens: <green>%completed%/%total%"
    - "<white>Asesino:"
    - "%killers%"
    - ""
  ending:
    - ""
    - "<white>Estado: <red>TERMINADO"
    - "<white>Ganador(es): %killers%"
    - ""

# --- GENERADORES ---
generators:
  names:
    RAW_IRON_BLOCK: "<gold>GENERADOR DE CHATARRA"
    IRON_BLOCK: "<white>SISTEMA ELÉCTRICO"
    AMETHYST_BLOCK: "<purple>NÚCLEO DE MEMORIA"
  hologram:
    lines-idle:
      - "<gold><bold>{name}"
      - "<white>Progreso: <gray>{progress}%"
      - "<yellow>¡Click para reparar!"
    lines-completed:
      - "<green><bold>✔ ENERGÍA RESTAURADA ✔"
      - "<gray>¡Buen trabajo!"

# --- ROLES ---
roles:
  survivor:
    title: "<green><bold>SUPERVIVIENTE"
    subtitle: "<white>Repara los generadores y escapa."
    chat:
      - "<green>Busca bloques de <gold>Hierro Crudo</gold>."
      - "<red>¡No falles las pruebas de habilidad!"
  killer:
    title: "<red><bold>ASESINO"
    subtitle: "<white>Elimina a todos antes de que acabe el tiempo."
    transform: "<prefix><gray>Tu humanidad se desvanece... Despertaste como: </gray>{name}"
    chat:
      - "<green>Mata a todos los jugadores uno por uno."
      - "<red>Sin piedad..."

# --- MENSAJES DEL ASESINO ---
killer:
  transform: "<white>Has despertado como: </white>{name}"
  killer-no-regen: "<prefix><red>⚠ Sin regeneración natural. ¡Mata para curarte!"

# --- TIENDA ---
tienda:
  titulo: "<dark_gray>Asesinos | Mistaken"
  titulo-supervivientes: "<#00d4ff>Supervivientes | Mercado Negro"
  clase-especial: "<dark_gray>Entidad de Clase Especial"
  clase-humana: "<gray>Clase: <white>Superviviente Humano"
  habilidades-titulo: "<gray>▶ <white>Habilidades:"
  estado-seleccionado: "<green>✔ <bold>SELECCIONADO"
  estado-poseido: "<yellow>» Click para seleccionar"
  estado-precio: "<white>Costo: <yellow>● {amount} monedas"
  estado-comprar: "<green>Click para adquirir asesino"
  estado-comprar-superviviente: "<#00d4ff>Click para adquirir superviviente"
  seleccionado: "<prefix><green>Seleccionado: <white>{name}"
  comprado: "<prefix><gold>¡Chido! Desbloqueaste a: <white>{name}"
  ya-seleccionado: "<yellow><bold>[!] <reset><yellow>Esta clase ya está seleccionada."

