# ======================================================
#          MISTAKEN - FRENCH LANGUAGE
# ======================================================

prefix: "<b><color:#88C6F2>MISTAKEN</color></b> <color:#ADADAD>|</color> "

# --- VOTE ---
voting:
  started: "<green>Le vote a commencé ! Utilisez <yellow>/vote <map></yellow>"
  not-active: "<prefix><red>Il n'y a aucun vote actif pour le moment, mon pote."
  already-voted: "<prefix><red>Tu as déjà voté pour ce match."
  usage: "<prefix><red>Utilisation : /vote <map>"
  not-found: "<prefix><red>La carte <white>{map}</white> n'existe pas."
  success: "<prefix><green>Tu as voté pour : <aqua>{map}</aqua>"
  map-option: "<dark_gray>» <aqua>{map}</aqua>"
  not-enough-players: "<prefix><red>Pas assez d'âmes ! Pas assez de joueurs pour commencer."

# --- BARRE DE BOSS ---
bossbar:
  lobby: "<gradient:#ffcc00:#ffaa00><bold>ATTENTE DE JOUEURS...</bold></gradient> <gray>({online})"
  voting: "<b><color:#8AFF73>VOTE EN COURS</color></b> <gray>| <white>Fin dans : <yellow>{time}s"
  starting: "<red><bold>PRÉPARE-TOI !</bold> <white>Départ dans <yellow>{time}s"
  ingame: "<white>Carte : <yellow>{map}</yellow> <dark_gray>|</dark_gray> Mode : <aqua>{mode}</aqua> <dark_gray>|</dark_gray> Temps : <green>{time}</green>"
  ending: "<b><color:#FF001D>MATCH TERMINÉ !</color></b>"
  colors:
    lobby: "YELLOW"
    voting: "WHITE"
    starting: "PURPLE"
    ingame: "RED"
    ending: "PINK"

# --- COMBAT ---
combat:
  heart-icon-on: "❤"
  heart-icon-off: "🖤"
  hunters-mark: "<red>"
  health-bar: "<red>{hearts_on}<gray>{hearts_off}"
  cooldown: "<red>Attends <white>{time}s</white> avant d'attaquer à nouveau !"
  critical-wound: "<prefix><red><bold>TES JAMBES TE LÂCHENT !</bold> <gray>Cherche de l'aide ou rampe."
  kill-reward-actionbar: "<red><bold>+40 VIE</bold></red> <gray>|</gray> <gold><bold>+${reward} CRÉDITS</bold></gold>"
  kill-reward-chat: "<prefix><gray>Tu as reçu <green>${reward}</green> pour avoir éliminé une victime."
  rescue-start-carrier: "<prefix><green>Tu portes <white>{target}</white> ! Mets-le en sécurité."
  rescue-start-victim: "<prefix><green><white>{carrier}</white> te porte."
  rescue-dropped-carrier: "<prefix><yellow>Tu as déposé ton coéquipier au sol."
  rescue-dropped-victim: "<prefix><yellow>On t'a laissé tomber."
  rescue-interrupted: "<prefix><red>Tu as lâché ton coéquipier à cause de l'impact !"
  win-reward-killer: "<prefix><gold>Massacre terminé ! <white>Tu as reçu <green>${amount}</green> pour ta victoire."
  win-reward-survivor: "<green>Tu as survécu au tueur ! <white>Tu as reçu <green>${amount}</green> pour ta survie."

# --- SCOREBOARD ---
scoreboard:
  title: "<gradient:#88C6F2:#4386B5><bold>MISTAKEN</bold></gradient>"
  lobby:
