    - "<white>Statut : <yellow>Lobby"
    - "<white>Joueurs : <green>%online%"
    - ""
    - "<white>Profil : <aqua>%player%"
    - ""
  voting:
    - ""
    - "<white>Phase : <aqua>VOTE"
    - "<white>Temps : <yellow>%timer%s"
    - ""
    - "<gray>Utilise /vote"
    - ""
  starting:
    - ""
    - "<white>Carte : <green>%map%"
    - "<white>Départ dans : <yellow>%timer%s"
    - ""
    - "<red><bold>PRÉPARE-TOI !</bold>"
    - ""
  ingame_classic:
    - ""
    - "<white>Carte : <green>%map%"
    - "<white>Temps : <yellow>%timer%"
    - ""
    - "<white>Gens : <green>%completed%/%total%"
    - "<white>Tueur :"
    - "%killers%"
    - ""
    - "<white>Vies : <red>%lives% ❤"
    - ""
  ingame_double_killer:
    - ""
    - "<white>Carte : <green>%map%"
    - "<white>Temps : <yellow>%timer%"
    - ""
    - "<white>Gens : <green>%completed%/%total%"
    - "<white>Tueurs :"
    - "%killers%"
    - ""
    - "<white>Vies : <red>%lives% ❤"
    - ""
  ingame_one_bounce:
    - ""
    - "<white>Carte : <green>%map%"
    - "<white>Temps : <yellow>%timer%"
    - ""
    - "<white>Gens : <green>%completed%/%total%"
    - "%killers%"
    - ""
    - "<white>Vies : <red>%lives% ❤"
    - ""
  ingame_freeze_tag:
    - ""
    - "<white>Carte : <green>%map%"
    - "<white>Temps : <yellow>%timer%"
    - ""
    - "<white>Gens : <green>%completed%/%total%"
    - "<white>Tueur :"
    - "%killers%"
    - ""
  ending:
    - ""
    - "<white>Statut : <red>FIN"
    - "<white>Gagnant(s) : %killers%"
    - ""

# --- GÉNÉRATEURS ---
generators:
  names:
    RAW_IRON_BLOCK: "<gold>GÉNÉRATEUR DE FERRAILLE"
    IRON_BLOCK: "<white>SYSTÈME ÉLECTRIQUE"
    AMETHYST_BLOCK: "<purple>NOYAU MÉMOIRE"
  hologram:
    lines-idle:
      - "<gold><bold>{name}"
      - "<white>Progression : <gray>{progress}%"
      - "<yellow>Clic pour réparer !"
    lines-completed:
      - "<green><bold>✔ ÉNERGIE RESTAURÉE ✔"
      - "<gray>Bon travail !"

# --- RÔLES ---
roles:
  survivor:
    title: "<green><bold>SURVIVANT"
    subtitle: "<white>Répare les générateurs et échappe-toi."
    chat:
      - "<green>Cherche des blocs de <gold>Fer Brut</gold>."
      - "<red>Ne rate pas les tests de compétence !"
  killer:
    title: "<red><bold>TUEUR"
    subtitle: "<white>Élimine tout le monde avant la fin du temps."
    transform: "<prefix><gray>Ton humanité s'efface... Tu t'es éveillé en tant que : </gray>{name}"
    chat:
      - "<green>Tue tous les joueurs un par un."
      - "<red>Sans pitié..."

# --- MESSAGES DU TUEUR ---
killer:
  transform: "<white>Tu t'es éveillé en tant que : </white>{name}"
  killer-no-regen: "<prefix><red>⚠ Pas de régénération naturelle. Tue pour te soigner !"

# --- BOUTIQUE ---
tienda:
  titulo: "<dark_gray>Tueurs | Mistaken"
  titulo-supervivientes: "<#00d4ff>Survivants | Marché Noir"
